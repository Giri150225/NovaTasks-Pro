<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaTasks Pro</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Header -->

    <div class="header">

        <div>
            <h1>🚀 NovaTasks Pro</h1>
            <p>Smart Productivity Dashboard</p>
        </div>

        <div id="todayDate"></div>

    </div>

    <!-- Welcome -->

    <div class="welcome">

        <h2>Welcome Back 👋</h2>

        <p>
            Manage your tasks efficiently and stay productive.
        </p>

    </div>

    <!-- Dashboard -->

    <div class="dashboard">

        <div class="card">
            <p>Total Tasks</p>
            <h2 id="totalTasks">0</h2>
        </div>

        <div class="card">
            <p>Completed</p>
            <h2 id="completedTasks">0</h2>
        </div>

        <div class="card">
            <p>Pending</p>
            <h2 id="pendingTasks">0</h2>
        </div>

    </div>

    <!-- Progress Section -->

    <div class="progress-section">

        <div class="progress-header">

            <h3>📈 Task Completion Progress</h3>

            <span id="progressText">0%</span>

        </div>

        <div class="progress-bar-bg">

            <div
                class="progress-bar"
                id="progressBar">
            </div>

        </div>

    </div>

    <!-- Search -->

    <input
        type="text"
        id="search"
        class="search"
        placeholder="🔍 Search tasks..."
        onkeyup="searchTasks()">

    <!-- Add Task -->

    <div class="controls">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter task title">

        <input
            type="date"
            id="taskDate">

        <select id="priority">

            <option value="High">
                🔴 High Priority
            </option>

            <option value="Medium">
                🟡 Medium Priority
            </option>

            <option value="Low">
                🟢 Low Priority
            </option>

        </select>

        <button onclick="addTask()">
            ➕ Add Task
        </button>

    </div>

    <!-- Task List -->

    <div
        id="taskList"
        class="task-list">
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
